syntax = "proto3";

package taoniu.local.cryptos.grpc.binance.spot.indicators.daily.ranking;
option go_package = "taoniu.local/cryptos/grpc/binance/spot/indicators/daily/ranking";

service Ranking {
  rpc Paginate (PaginateRequest) returns (PaginateReply) {}
}

message PaginateRequest {
  string symbol = 1;
  repeated string fields = 2;
  string sortField = 3;
  int32 sortType = 4;
  int32 current = 5;
  int32 pageSize = 6;
}

message PaginateReply {
  int64 total = 1;
  repeated string data = 2;
}
