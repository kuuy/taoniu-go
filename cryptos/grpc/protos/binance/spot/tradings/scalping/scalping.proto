syntax = "proto3";

package taoniu.local.cryptos.grpc.binance.spot.tradings.scalping;
option go_package = "taoniu.local/cryptos/grpc/binance/spot/tradings/scalping";

import "google/protobuf/timestamp.proto";

service Scalping {
  rpc Paginate (PaginateRequest) returns (PaginateReply) {}
}

message ScalpingInfo {
  string id = 1;
  string symbol = 2;
  float buyPrice = 3;
  float buyQuantity = 4;
  float sellPrice = 5;
  float sellQuantity = 6;
  int32 status = 7;
  google.protobuf.Timestamp createdAt = 8;
  google.protobuf.Timestamp updatedAt = 9;
}

message PaginateRequest {
  string symbol = 1;
  repeated uint32 status = 2;
  int32 current = 3;
  int32 pageSize = 4;
}

message PaginateReply {
  int64 total = 1;
  repeated ScalpingInfo data = 2;
}
